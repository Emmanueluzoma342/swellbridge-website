# Netlify configuration for Swellbridge Digital

[build]
  publish = "."

# Pretty URLs — visitors can go to /real-estate instead of /real-estate.html
[[redirects]]
  from = "/real-estate"
  to = "/real-estate.html"
  status = 200

[[redirects]]
  from = "/meta-ads"
  to = "/meta-ads.html"
  status = 200

[[redirects]]
  from = "/funnels"
  to = "/funnels.html"
  status = 200

[[redirects]]
  from = "/web-design"
  to = "/web-design.html"
  status = 200

[[redirects]]
  from = "/automation"
  to = "/automation.html"
  status = 200

[[redirects]]
  from = "/case-studies"
  to = "/case-studies.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

[[redirects]]
  from = "/blog"
  to = "/blog.html"
  status = 200

[[redirects]]
  from = "/results"
  to = "/case-studies.html"
  status = 301

# Security and performance headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache static assets aggressively
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# 404 fallback
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
